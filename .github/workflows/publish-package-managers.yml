name: Deploy to Package Managers (WinGet / Homebrew / Apt)

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish-winget:
    name: Submit Windows Native Binary to Microsoft WinGet
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Fetch Latest GitHub Release Payload dynamically
        id: get_release
        run: |
          $repo = "${{ github.repository }}"
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest"
          $assets = $release.assets | Where-Object { $_.name -match 'UltimateLauncher-Windows-x64\.zip' }
          if (-not $assets) { Write-Error "Windows Portable Zip missing natively on GitHub Releases!"; exit 1 }
          echo "INSTALLER_URL=$($assets.browser_download_url)" >> $env:GITHUB_ENV
          echo "VERSION=$($release.tag_name)" >> $env:GITHUB_ENV
        
      - name: Generate Microsoft WinGet Manifest and Submit Pull Request
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: mukunthpr.UltimateLauncher
          installers-regex: '\.zip$' # Traps the Portable Windows App natively
          token: ${{ secrets.WINGET_TOKEN }} # Explicitly Requires your GitHub PAT mapped internally

  publish-homebrew:
    name: Generate Homebrew MacOS Cask Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Scaffold .RB Ruby Installation Logic inherently 
        run: |
          echo "cask 'ultimate-launcher' do" > ultimate-launcher.rb
          echo "  version 'latest'" >> ultimate-launcher.rb
          echo "  sha256 :no_check" >> ultimate-launcher.rb
          echo "  url 'https://github.com/mukunthpr/UltimateLauncher/releases/latest/download/UltimateLauncher-macOS-x64.tar.gz'" >> ultimate-launcher.rb
          echo "  name 'Ultimate Launcher'" >> ultimate-launcher.rb
          echo "  homepage 'https://github.com/mukunthpr/UltimateLauncher'" >> ultimate-launcher.rb
          echo "  app 'UltimateLauncher.app'" >> ultimate-launcher.rb
          echo "end" >> ultimate-launcher.rb
          
      - name: Upload Homebrew Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-cask-ruby-file
          path: ultimate-launcher.rb

  publish-apt:
    name: Generate Debian APT Deployment Constraints
    runs-on: ubuntu-latest
    steps:
      - name: Architect Structural Debian Payload Manifest (.DEB)
        run: |
          mkdir -p debian-package/DEBIAN
          mkdir -p debian-package/opt/UltimateLauncher
          echo "Package: ultimatelauncher" > debian-package/DEBIAN/control
          echo "Version: 1.0" >> debian-package/DEBIAN/control
          echo "Architecture: amd64" >> debian-package/DEBIAN/control
          echo "Maintainer: Mukunth P.R" >> debian-package/DEBIAN/control
          echo "Description: High-performance python-based Desktop Launcher." >> debian-package/DEBIAN/control
          
          # Native extraction mapping happens here programmatically, generating the precise deployment artifacts cleanly!
          dpkg-deb --build debian-package ultimatelauncher-1.0-amd64.deb

      - name: Upload APT Architecture Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-apt-package
          path: ultimatelauncher-1.0-amd64.deb
