name: Build & Release Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Qt & Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller UltimateLauncher.spec --noconfirm

      - name: Compile Inno Setup Installer (Windows)
        if: runner.os == 'Windows'
        run: |
          # Use the pre-installed Inno Setup compiler available on GitHub Actions windows-latest runners natively
          iscc build_installer.iss

      - name: Prepare Upload Artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          move dist\setup\UltimateLauncher_Setup.exe UltimateLauncher-Windows-x64-Setup.exe

      - name: Prepare Upload Artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          npm install -g create-dmg
          create-dmg UltimateLauncher.app || true
          mv *.dmg ../UltimateLauncher-macOS-x64.dmg

      - name: Prepare Upload Artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          mkdir -p debian-package/DEBIAN
          mkdir -p debian-package/opt/UltimateLauncher
          mkdir -p debian-package/usr/share/applications
          mkdir -p debian-package/usr/share/icons/hicolor/256x256/apps
          
          # Copy binaries and assets
          cp -r UltimateLauncher/* debian-package/opt/UltimateLauncher/
          cp ../assets/icon.png debian-package/usr/share/icons/hicolor/256x256/apps/ultimatelauncher.png
          
          # Generate Desktop Entry
          cat <<EOF > debian-package/usr/share/applications/ultimatelauncher.desktop
          [Desktop Entry]
          Type=Application
          Name=Ultimate Launcher
          Comment=High-performance python-based Desktop Launcher.
          Exec=/opt/UltimateLauncher/UltimateLauncher
          Icon=ultimatelauncher
          Terminal=false
          Categories=Utility;
          EOF
          
          # DEBIAN Control File
          echo "Package: ultimatelauncher" > debian-package/DEBIAN/control
          echo "Version: 1.0.0" >> debian-package/DEBIAN/control
          echo "Architecture: amd64" >> debian-package/DEBIAN/control
          echo "Maintainer: Mukunth P.R" >> debian-package/DEBIAN/control
          echo "Description: High-performance python-based Desktop Launcher." >> debian-package/DEBIAN/control
          
          dpkg-deb --build debian-package UltimateLauncher-Linux-x64.deb
          mv UltimateLauncher-Linux-x64.deb ../

      - name: Upload Windows Asset
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.0"
          files: UltimateLauncher-Windows-x64-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS Asset
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.0"
          files: UltimateLauncher-macOS-x64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux Asset
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.0"
          files: UltimateLauncher-Linux-x64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
