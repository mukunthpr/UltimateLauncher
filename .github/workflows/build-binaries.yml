name: Build & Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Qt & Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller UltimateLauncher.spec --noconfirm

      - name: Prepare Upload Artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          # Compress the .app bundle since GitHub doesn't natively upload directories gracefully standalone
          cd dist
          tar -czf UltimateLauncher-macOS-x64.tar.gz UltimateLauncher.app
          mv UltimateLauncher-macOS-x64.tar.gz ../

      - name: Prepare Upload Artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf UltimateLauncher-Linux-x64.tar.gz UltimateLauncher
          mv UltimateLauncher-Linux-x64.tar.gz ../

      - name: Compile Inno Setup Installer (Windows)
        if: runner.os == 'Windows'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: build_installer.iss
          options: /Qp

      - name: Upload Windows Asset
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'Continuous-Build' }}
          files: dist\setup\UltimateLauncher_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS Asset
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'Continuous-Build' }}
          files: UltimateLauncher-macOS-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux Asset
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'Continuous-Build' }}
          files: UltimateLauncher-Linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
